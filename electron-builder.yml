appId: com.dushyantgarg.cranberri
productName: Cranberri
copyright: Copyright © 2026 Dushyant Garg
directories:
  output: dist
  buildResources: buildResources
files:
  - out/**/*
  - package.json
asar: true
npmRebuild: false
asarUnpack:
  - out/updater/install-helper.mjs
mac:
  icon: buildResources/icon.icns
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
dmg:
  sign: false
  writeUpdateInfo: false
publish: null
