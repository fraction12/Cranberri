name: cranberri-chat-smoothness
description: Optimize Cranberri chat run UX so working/thinking/reasoning/compaction affordances are stable, non-duplicated, correctly classified, and renderer-safe.

metric:
  primary:
    type: hard
    name: chat_affordance_score
    direction: maximize
    target: 100
  degenerate_gates:
    - name: build_passed
      check: "== 1"
      description: Full production build must pass.
    - name: chat_files_present
      check: "== 1"
      description: Chat state/rendering/protocol files must exist.
    - name: duplicate_running_affordance_static
      check: "== 0"
      description: Static guard should prevent duplicate running affordances once reasoning exists.
    - name: raw_delta_render_static
      check: "== 0"
      description: Raw agent_message_delta content must not render before completion phase is known.
  diagnostics:
    - name: build_seconds
    - name: reasoning_group_render_sites
    - name: compact_hydration
    - name: compact_protocol
    - name: telemetry_available
    - name: chat_snapshot_telemetry
    - name: run_end_replay_risk
    - name: telemetry_churn_risk
    - name: duplicate_run_end_risk

measurement:
  command: "node scripts/measure-chat-ux.mjs"
  timeout_seconds: 600
  working_directory: "."
  stability:
    mode: stable
    noise_threshold: 0.02

scope:
  mutable:
    - "src/renderer/components/ChatWindow.tsx"
    - "src/renderer/state/codex.tsx"
    - "src/main/codex/client.ts"
    - "src/main/codex/ipc.ts"
    - "src/main/telemetry.ts"
    - "src/preload/index.ts"
    - "src/renderer/vite-env.d.ts"
  immutable:
    - "scripts/measure-chat-ux.mjs"
    - "package.json"
    - "package-lock.json"
    - "tsconfig.json"
    - "eslint.config.mjs"

execution:
  mode: serial
  backend: worktree
  max_concurrent: 1

parallel:
  port_strategy: none
  shared_files: []

dependencies:
  approved: []

constraints:
  - "No new dependencies without explicit approval."
  - "Do not restart or kill app-managed terminal sessions."
  - "Preserve direct Codex app-server lifecycle; do not spawn per-window Codex processes."
  - "Optimize for smooth chat UX, stable affordance placement, and low renderer churn."

stopping:
  max_iterations: 4
  max_hours: 1
  plateau_iterations: 2
  target_reached: true

max_runner_up_merges_per_batch: 0
