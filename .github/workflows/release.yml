name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, for example v0.1.0
        required: true
        type: string
      title:
        description: Release title. Defaults to the tag.
        required: false
        type: string
      prerelease:
        description: Mark release as prerelease
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  macos-arm64:
    name: Build macOS arm64 release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Package DMG and updater zip
        run: npm run package

      - name: Verify packaged runtime budgets
        run: npm run measure:runtime

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          title="${TITLE:-$TAG}"
          prerelease_flag=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$TAG" \
            dist/Cranberri-*-arm64.dmg \
            dist/Cranberri-*-arm64-mac.zip \
            dist/Cranberri-*-arm64-mac.zip.blockmap \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --generate-notes \
            $prerelease_flag
